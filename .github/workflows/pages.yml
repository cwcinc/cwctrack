name: Deploy Pages
on:
  push:
    tags: ['*']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6

      - name: Set mod version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          sed -i.bak -E "s/MOD_VERSION = \"[^\"]*\";/MOD_VERSION = \"${VERSION}\";/" mods/kodub_mod_config.js
          rm mods/kodub_mod_config.js.bak
          grep MOD_VERSION mods/kodub_mod_config.js

      - name: Stage site
        run: |
          mkdir site
          cp package.json site/
          cp *.bundle.js site/
          cp forced_square.* site/
          cp favicon.ico index.html style.css site/
          cp polytrack_physics.wasm site/
          cp manifest.json site/
          cp -r mods models images lib audio tracks site/
          [ -f CNAME ] && cp CNAME site/ || true

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v4
        with:
          path: site

      - id: deployment
        uses: actions/deploy-pages@v4