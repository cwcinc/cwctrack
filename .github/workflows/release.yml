name: Release
on:
  push:
    tags: ['*']
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  test:
    uses: ./.github/workflows/ci.yml
    permissions:
      contents: read

  deploy-pages:
    needs: test
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6

      - name: Set mod version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          sed -i.bak -E "s/MOD_VERSION = \"[^\"]*\";/MOD_VERSION = \"${VERSION}\";/" mods/kodub_mod_config.js
          rm mods/kodub_mod_config.js.bak
          grep MOD_VERSION mods/kodub_mod_config.js

      - name: Stage site
        run: |
          mkdir site
          cp package.json site/
          cp *.bundle.js site/
          cp forced_square.* site/
          cp favicon.ico index.html style.css site/
          cp polytrack_physics.wasm site/
          cp manifest.json site/
          cp og-preview.png site/
          cp -r mods models images lib audio tracks site/
          [ -f CNAME ] && cp CNAME site/ || true

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v4
        with:
          path: site

      - id: deployment
        uses: actions/deploy-pages@v4

  asar:
    needs: test
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 'latest'

      - name: Install asar
        run: npm install -g @electron/asar

      - name: Set mod version
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          sed -i.bak -E "s/MOD_VERSION = \"[^\"]*\";/MOD_VERSION = \"${VERSION}\";/" mods/kodub_mod_config.js
          rm mods/kodub_mod_config.js.bak

      - name: Stage build
        run: |
          mkdir staging
          cp package.json staging/
          cp *.bundle.js staging/
          cp forced_square.* staging/
          cp favicon.ico index.html style.css staging/
          cp polytrack_physics.wasm staging/
          cp manifest.json staging/
          cp -r mods models images lib audio electron tracks staging/
          cp mods/proxy.release.js staging/mods/proxy.js
          rm staging/mods/proxy.release.js

      - name: Pack asar
        run: asar pack staging app.asar

      - uses: actions/upload-artifact@v4
        with:
          name: app-asar
          path: app.asar

  build:
    needs: test
    if: startsWith(github.ref, 'refs/tags/')
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 'latest'
          cache: 'npm'

      - name: Set mod version
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          sed -i.bak -E "s/MOD_VERSION = \"[^\"]*\";/MOD_VERSION = \"${VERSION}\";/" mods/kodub_mod_config.js
          rm mods/kodub_mod_config.js.bak

      - name: Install dependencies
        run: npm ci

      - name: Use release proxy
        shell: bash
        run: cp mods/proxy.release.js mods/proxy.js

      - name: Build with electron-builder
        run: npx electron-builder --publish never

      - uses: actions/upload-artifact@v4
        with:
          name: installers-${{ matrix.os }}
          path: |
            dist/*.exe
            dist/*.dmg
            dist/*.AppImage
            dist/*.zip
            dist/latest*.yml
          if-no-files-found: ignore

  release:
    needs: [asar, build]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifacts
        run: |
          mkdir release
          find artifacts -type f \( -name '*.exe' -o -name '*.dmg' -o -name '*.AppImage' -o -name '*.zip' -o -name 'app.asar' \) -exec cp {} release/ \;
          ls -la release/

      - name: Build release notes
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          sed -e "s|{{VERSION}}|${VERSION}|g" \
              -e "s|{{TAG}}|${TAG}|g" \
              -e "s|{{REPO}}|${{ github.repository }}|g" \
              RELEASE_TEMPLATE.md > release-notes.md
          cat release-notes.md

      - uses: softprops/action-gh-release@v3
        with:
          files: release/*
          body_path: release-notes.md
          generate_release_notes: true